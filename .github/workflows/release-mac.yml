name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create/update, for example v0.1.0"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release-mac:
    runs-on: macos-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate app code
        run: |
          pnpm typecheck
          pnpm test

      - name: Validate release secrets
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          OAUTH_PROXY_URL: ${{ secrets.OAUTH_PROXY_URL }}
          OAUTH_PROXY_SECRET: ${{ secrets.OAUTH_PROXY_SECRET }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_GCAL_AUTH_CONFIG: ${{ secrets.COMPOSIO_GCAL_AUTH_CONFIG }}
          COMPOSIO_GMAIL_AUTH_CONFIG: ${{ secrets.COMPOSIO_GMAIL_AUTH_CONFIG }}
        run: pnpm release:check-secrets

      - name: Import Apple signing certificate
        uses: apple-actions/import-codesign-certs@v2
        with:
          p12-file-base64: ${{ secrets.CERTIFICATE_P12 }}
          p12-password: ${{ secrets.CERTIFICATE_PASSWORD }}

      - name: Build, notarize, staple, and verify
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "true"
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          OAUTH_PROXY_URL: ${{ secrets.OAUTH_PROXY_URL }}
          OAUTH_PROXY_SECRET: ${{ secrets.OAUTH_PROXY_SECRET }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          COMPOSIO_GCAL_AUTH_CONFIG: ${{ secrets.COMPOSIO_GCAL_AUTH_CONFIG }}
          COMPOSIO_GMAIL_AUTH_CONFIG: ${{ secrets.COMPOSIO_GMAIL_AUTH_CONFIG }}
        run: pnpm release:mac

      - name: Publish verified artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: node scripts/release/upload-github.js
